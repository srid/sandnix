name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run tests
        run: just test
